# Copia este archivo a .streamlit/secrets.toml y completa los valores reales.
# NUNCA subas secrets.toml (con las claves reales) a un repositorio público.

spreadsheet_id = "PEGA_AQUI_EL_ID_DE_TU_GOOGLE_SHEET"

[gcp_service_account]
type = "service_account"
project_id = "tu-proyecto"
private_key_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
private_key = "-----BEGIN PRIVATE KEY-----\nMIIExxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx\n-----END PRIVATE KEY-----\n"
client_email = "nombre-cuenta-servicio@tu-proyecto.iam.gserviceaccount.com"
client_id = "000000000000000000000"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/nombre-cuenta-servicio%40tu-proyecto.iam.gserviceaccount.com"
universe_domain = "googleapis.com"
